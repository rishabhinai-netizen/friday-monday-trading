name: FM Friday Scanner — 3:30 PM IST

on:
  schedule:
    - cron: '0 10 * * 5'   # Every Friday at 10:00 UTC = 3:30 PM IST
  workflow_dispatch:        # Allow manual trigger

jobs:
  friday-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Friday Scanner
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python fm_live.py friday --capital 500000 --risk 1.0

      - name: Upload watchlist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: friday-watchlist-${{ github.run_id }}
          path: '*.csv'
          retention-days: 7
