name: FM Monday Signals — 9:20 AM IST

on:
  schedule:
    - cron: '50 3 * * 1'   # Every Monday at 03:50 UTC = 9:20 AM IST
  workflow_dispatch:

jobs:
  monday-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 3      # Must complete fast — email by 9:21 AM
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Monday Signal Scanner
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python fm_live.py monday --capital 500000 --risk 1.0

      - name: Check timing
        run: echo "Completed at $(date -u '+%H:%M:%S UTC') | IST $(TZ='Asia/Kolkata' date '+%H:%M:%S')"
